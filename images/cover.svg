<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5e2ca5"/>
      <stop offset="1" stop-color="#3d1c6b"/>
    </linearGradient>
    <linearGradient id="band" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f6b40e"/>
      <stop offset="1" stop-color="#ff9500"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Decorative top band -->
  <rect x="60" y="80" width="80" height="4" fill="url(#band)"/>

  <!-- Subtitle -->
  <text x="60" y="120" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="2" font-weight="500">COURS INTENSIF · BACHELOR TS</text>
  <text x="60" y="140" font-size="13" fill="rgba(255,255,255,0.7)" letter-spacing="1">HETS Genève · HES-SO</text>

  <!-- Main title -->
  <text x="60" y="260" font-size="44" fill="white" font-weight="700" letter-spacing="-0.5">Handicap,</text>
  <text x="60" y="310" font-size="44" fill="white" font-weight="700" letter-spacing="-0.5">autonomie</text>
  <text x="60" y="360" font-size="44" fill="white" font-weight="700" letter-spacing="-0.5">et travail</text>
  <text x="60" y="410" font-size="44" fill="white" font-weight="700" letter-spacing="-0.5">social</text>

  <!-- Underline accent -->
  <line x1="60" y1="430" x2="220" y2="430" stroke="#f6b40e" stroke-width="3"/>

  <!-- Subtitle -->
  <text x="60" y="475" font-size="18" fill="rgba(255,255,255,0.9)" font-style="italic">Huit séances pour penser</text>
  <text x="60" y="500" font-size="18" fill="rgba(255,255,255,0.9)" font-style="italic">les défis d'une posture</text>
  <text x="60" y="525" font-size="18" fill="rgba(255,255,255,0.9)" font-style="italic">professionnelle</text>

  <!-- Diagram element : 4 small circles representing 4 models -->
  <g transform="translate(60,600)">
    <circle cx="0" cy="0" r="8" fill="#f6b40e"/>
    <line x1="8" y1="0" x2="42" y2="0" stroke="#f6b40e" stroke-width="2" opacity="0.6"/>
    <circle cx="50" cy="0" r="8" fill="white"/>
    <line x1="58" y1="0" x2="92" y2="0" stroke="white" stroke-width="2" opacity="0.4"/>
    <circle cx="100" cy="0" r="8" fill="white" opacity="0.7"/>
    <line x1="108" y1="0" x2="142" y2="0" stroke="white" stroke-width="2" opacity="0.3"/>
    <circle cx="150" cy="0" r="8" fill="white" opacity="0.5"/>
  </g>

  <!-- Author block at bottom -->
  <line x1="60" y1="680" x2="540" y2="680" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="60" y="710" font-size="20" fill="white" font-weight="600">Pierre Brasseur</text>
  <text x="60" y="730" font-size="12" fill="rgba(255,255,255,0.7)">Sociologue · HETS Genève · HES-SO</text>
  <text x="60" y="750" font-size="11" fill="rgba(255,255,255,0.55)">Édition 2026 · CC BY-NC-SA 4.0</text>

  <!-- Spine vertical accent -->
  <rect x="540" y="100" width="2" height="200" fill="rgba(255,255,255,0.3)"/>
</svg>
